<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>SDF Ray March</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; }
      #root { position: relative; width: 1920px; height: 1080px; overflow: hidden; }
      #gl-canvas { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="8" data-width="1920" data-height="1080">
      <canvas id="gl-canvas" width="1920" height="1080"></canvas>
      <div id="driver" data-start="0" data-duration="8" data-track-index="0"
           style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none"></div>
    </div>

    <script>
    (function () {
      window.__timelines = window.__timelines || {};

      var canvas = document.getElementById("gl-canvas");
      var gl = canvas.getContext("webgl", { preserveDrawingBuffer: true });
      if (!gl) { window.__timelines["main"] = gsap.timeline({ paused: true }); return; }

      gl.viewport(0, 0, 1920, 1080);

      // ── Fullscreen quad ───────────────────────────────────
      var quadBuf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

      function compileShader(src, type) {
        var s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
        return s;
      }

      var vertSrc = "attribute vec2 a_pos; varying vec2 v_uv; void main(){ v_uv = a_pos; gl_Position = vec4(a_pos, 0, 1); }";

      var fragSrc = [
        "precision highp float;",
        "varying vec2 v_uv;",
        "uniform float u_time;",
        "uniform vec2 u_resolution;",
        "",
        "// Rotation matrix",
        "mat2 rot(float a) { float c = cos(a), s = sin(a); return mat2(c, -s, s, c); }",
        "",
        "// Smooth minimum for organic blending",
        "float smin(float a, float b, float k) {",
        "  float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);",
        "  return mix(b, a, h) - k * h * (1.0 - h);",
        "}",
        "",
        "// SDF scene — morphing infinite tunnel with fractal pillars",
        "float map(vec3 p) {",
        "  // Infinite repeat along Z",
        "  float cell = 4.0;",
        "  vec3 q = p;",
        "  q.z = mod(q.z + cell * 0.5, cell) - cell * 0.5;",
        "",
        "  // Morphing octahedron pillars",
        "  vec3 r = q;",
        "  r.xz *= rot(u_time * 0.3 + floor((p.z + cell * 0.5) / cell) * 1.57);",
        "  float octa = dot(abs(r), normalize(vec3(1.0))) - 0.8 - sin(u_time * 0.5) * 0.2;",
        "",
        "  // Tunnel (subtracted cylinder)",
        "  float tunnel = -(length(p.xy) - 2.5 + sin(p.z * 0.3 + u_time) * 0.3);",
        "",
        "  // Fractal folds",
        "  vec3 f = abs(q) - 1.2;",
        "  f = abs(f + 0.5) - 0.5;",
        "  float fractal = length(f.xy) - 0.08;",
        "",
        "  return smin(max(octa, tunnel), fractal, 0.3);",
        "}",
        "",
        "// Normal from SDF gradient",
        "vec3 calcNormal(vec3 p) {",
        "  vec2 e = vec2(0.001, 0.0);",
        "  return normalize(vec3(",
        "    map(p + e.xyy) - map(p - e.xyy),",
        "    map(p + e.yxy) - map(p - e.yxy),",
        "    map(p + e.yyx) - map(p - e.yyx)",
        "  ));",
        "}",
        "",
        "void main() {",
        "  vec2 uv = (v_uv * vec2(u_resolution.x / u_resolution.y, 1.0));",
        "",
        "  // Camera — fly through tunnel",
        "  vec3 ro = vec3(0.0, 0.0, u_time * 3.0);",
        "  ro.xy += vec2(sin(u_time * 0.7) * 0.5, cos(u_time * 0.5) * 0.3);",
        "  vec3 rd = normalize(vec3(uv, 1.5));",
        "  rd.xz *= rot(sin(u_time * 0.3) * 0.2);",
        "  rd.yz *= rot(cos(u_time * 0.4) * 0.15);",
        "",
        "  // Ray march",
        "  float t = 0.0;",
        "  float d;",
        "  for (int i = 0; i < 80; i++) {",
        "    d = map(ro + rd * t);",
        "    if (d < 0.001 || t > 30.0) break;",
        "    t += d * 0.8;",
        "  }",
        "",
        "  vec3 col = vec3(0.02, 0.01, 0.04);",
        "",
        "  if (d < 0.01) {",
        "    vec3 p = ro + rd * t;",
        "    vec3 n = calcNormal(p);",
        "",
        "    // Lighting",
        "    vec3 lightDir = normalize(vec3(0.0, 1.0, 1.0));",
        "    float diff = max(dot(n, lightDir), 0.0);",
        "    float spec = pow(max(dot(reflect(-lightDir, n), -rd), 0.0), 32.0);",
        "",
        "    // Color based on position and normal",
        "    vec3 baseCol = vec3(0.0, 0.6, 1.0) + n * 0.3;",
        "    float stripe = sin(p.z * 2.0 + u_time * 2.0) * 0.5 + 0.5;",
        "    baseCol = mix(baseCol, vec3(0.8, 0.0, 0.5), stripe * 0.4);",
        "",
        "    col = baseCol * (diff * 0.7 + 0.15) + vec3(0.8, 0.9, 1.0) * spec * 0.5;",
        "",
        "    // Fog",
        "    float fog = exp(-t * 0.08);",
        "    col = mix(vec3(0.02, 0.01, 0.04), col, fog);",
        "  }",
        "",
        "  // Vignette",
        "  float vig = 1.0 - dot(v_uv * 0.7, v_uv * 0.7);",
        "  col *= vig;",
        "",
        "  // Tone mapping",
        "  col = col / (col + 1.0);",
        "  col = pow(col, vec3(0.85));",
        "",
        "  gl_FragColor = vec4(col, 1.0);",
        "}",
      ].join("\n");

      var prog = gl.createProgram();
      gl.attachShader(prog, compileShader(vertSrc, gl.VERTEX_SHADER));
      gl.attachShader(prog, compileShader(fragSrc, gl.FRAGMENT_SHADER));
      gl.linkProgram(prog);
      if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(prog));

      var uTime = gl.getUniformLocation(prog, "u_time");
      var uRes = gl.getUniformLocation(prog, "u_resolution");
      var aPos = gl.getAttribLocation(prog, "a_pos");

      function renderFrame(time) {
        gl.useProgram(prog);
        gl.uniform1f(uTime, time);
        gl.uniform2f(uRes, 1920, 1080);
        gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
        gl.enableVertexAttribArray(aPos);
        gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      }

      var state = { time: 0 };
      var tl = gsap.timeline({
        paused: true,
        onUpdate: function () { renderFrame(state.time); }
      });

      tl.to(state, { time: 8, duration: 8, ease: "none" }, 0);

      renderFrame(0);
      window.__timelines["main"] = tl;
    })();
    </script>
  </body>
</html>
